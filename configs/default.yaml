data:
  data_dir: data
  expected_shape: [221, 375]

model:
  input_shape: [221, 375, 1]
  pretrained_path: models/pretrained_cae_wst_latent24_structural_audio.h5
  retrained_output_path: models/cae_wst_latent24_retrained.keras
  feature_layer: encoder_conv2
  legacy_feature_layer: conv2d_31
  map_ids: [18, 19]

training:
  validation_fraction: 0.15
  batch_size: 32
  epochs: 100

feature_maps:
  batch_size: 16

classifiers:
  positive_label: 1
  negative_label: 0
  candidates:
    - knn_k3
    - knn_k5
    - logistic_regression
    - svm_linear
    - svm_rbf
    - decision_tree

raw_audio:
  sample_rate: 48000
  sample_seconds: 0.5
  overlap_seconds: 0.1
  wst_j: 6
  wst_q: 16
  expected_wst_shape: [221, 375]
